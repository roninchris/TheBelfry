<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-label="Mockup of The Belfry multiplayer evidence board: pinned evidence cards linked by connection strings, with live presence indicators">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#70a2a8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#020912" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000305" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="660" fill="#020912"/>
  <rect width="1200" height="660" fill="url(#grid)"/>

  <!-- ── top bar ─────────────────────────────────────────────── -->
  <rect x="0" y="0" width="1200" height="52" fill="#0a1a22" fill-opacity="0.75"/>
  <line x1="0" y1="52" x2="1200" y2="52" stroke="#70a2a8" stroke-opacity="0.25"/>
  <rect x="24" y="20" width="3" height="14" fill="#00f3ff"/>
  <text x="38" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#b3e2e6">THE BELFRY</text>
  <text x="152" y="32" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#456c70">// EVIDENCE BOARD</text>
  <text x="300" y="32" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#2fffa8">● UPLINK SECURE</text>

  <!-- presence roster -->
  <text x="905" y="32" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#456c70">ON BOARD</text>
  <circle cx="990" cy="27" r="9" fill="#020912" stroke="#00f3ff" stroke-width="1.5"/>
  <circle cx="990" cy="27" r="3" fill="#00f3ff"/>
  <circle cx="1016" cy="27" r="9" fill="#020912" stroke="#ff9d2e" stroke-width="1.5"/>
  <circle cx="1016" cy="27" r="3" fill="#ff9d2e"/>
  <circle cx="1042" cy="27" r="9" fill="#020912" stroke="#2fffa8" stroke-width="1.5"/>
  <circle cx="1042" cy="27" r="3" fill="#2fffa8"/>
  <circle cx="1068" cy="27" r="9" fill="#020912" stroke="#ff3b4e" stroke-width="1.5"/>
  <circle cx="1068" cy="27" r="3" fill="#ff3b4e"/>
  <text x="1092" y="31" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#b3e2e6">4 LIVE</text>

  <!-- ── left rail ───────────────────────────────────────────── -->
  <rect x="0" y="52" width="60" height="608" fill="#08161d" fill-opacity="0.6"/>
  <line x1="60" y1="52" x2="60" y2="660" stroke="#70a2a8" stroke-opacity="0.18"/>
  <g fill="none" stroke="#456c70" stroke-width="1.5">
    <rect x="20" y="84" width="20" height="20" rx="2"/>
    <rect x="20" y="128" width="20" height="20" rx="2" stroke="#00f3ff"/>
    <rect x="20" y="172" width="20" height="20" rx="2"/>
    <rect x="20" y="216" width="20" height="20" rx="2"/>
    <rect x="20" y="260" width="20" height="20" rx="2"/>
    <rect x="20" y="304" width="20" height="20" rx="2"/>
  </g>
  <rect x="0" y="126" width="3" height="24" fill="#00f3ff"/>

  <!-- ── connection strings (drawn under the cards) ──────────── -->
  <g stroke="#ff3b4e" stroke-opacity="0.75" stroke-width="1.6" fill="none" filter="url(#glow)">
    <path d="M295 205 C 400 215, 415 300, 505 318"/>
    <path d="M660 200 C 600 240, 585 285, 560 305"/>
    <path d="M560 380 C 545 450, 430 455, 340 470"/>
    <path d="M655 350 C 730 365, 760 430, 775 470"/>
  </g>
  <g fill="#ff3b4e" fill-opacity="0.9">
    <circle cx="295" cy="205" r="3"/><circle cx="505" cy="318" r="3"/>
    <circle cx="660" cy="200" r="3"/><circle cx="560" cy="305" r="3"/>
    <circle cx="560" cy="380" r="3"/><circle cx="340" cy="470" r="3"/>
    <circle cx="655" cy="350" r="3"/><circle cx="775" cy="470" r="3"/>
  </g>

  <!-- ── evidence card: ciphertext (cyan owner) ──────────────── -->
  <g>
    <rect x="120" y="130" width="175" height="120" fill="#0d1f27" fill-opacity="0.92" stroke="#70a2a8" stroke-opacity="0.35"/>
    <rect x="120" y="130" width="175" height="18" fill="#00f3ff" fill-opacity="0.12"/>
    <text x="130" y="143" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.2" fill="#00f3ff">CIPHERTEXT</text>
    <path d="M120 130h10M120 130v10" stroke="#00f3ff" stroke-width="2" fill="none"/>
    <path d="M295 250h-10M295 250v-10" stroke="#00f3ff" stroke-width="2" fill="none"/>
    <text x="130" y="172" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">GUR PBQR VF</text>
    <text x="130" y="188" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">UVQQRA VA</text>
    <text x="130" y="204" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">GUR NFURF</text>
    <text x="130" y="232" font-family="ui-monospace, Menlo, monospace" font-size="8.5" letter-spacing="1" fill="#456c70">ROT13 · 92% MATCH</text>
    <circle cx="283" cy="140" r="4" fill="#00f3ff"/>
  </g>

  <!-- ── evidence card: image (amber owner) ──────────────────── -->
  <g>
    <rect x="485" y="130" width="175" height="120" fill="#0d1f27" fill-opacity="0.92" stroke="#70a2a8" stroke-opacity="0.35"/>
    <rect x="485" y="130" width="175" height="18" fill="#ff9d2e" fill-opacity="0.12"/>
    <text x="495" y="143" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.2" fill="#ff9d2e">IMAGE · LSB</text>
    <path d="M485 130h10M485 130v10" stroke="#ff9d2e" stroke-width="2" fill="none"/>
    <path d="M660 250h-10M660 250v-10" stroke="#ff9d2e" stroke-width="2" fill="none"/>
    <rect x="497" y="158" width="151" height="58" fill="#071720" stroke="#456c70" stroke-opacity="0.4"/>
    <path d="M497 200 L 530 176 L 556 198 L 585 168 L 620 202 L 648 186" fill="none" stroke="#70a2a8" stroke-opacity="0.55" stroke-width="1.4"/>
    <text x="497" y="234" font-family="ui-monospace, Menlo, monospace" font-size="8.5" letter-spacing="1" fill="#456c70">PAYLOAD RECOVERED · 1.2 KB</text>
    <circle cx="648" cy="140" r="4" fill="#ff9d2e"/>
  </g>

  <!-- ── evidence card: audio (green owner) ──────────────────── -->
  <g>
    <rect x="470" y="300" width="185" height="110" fill="#0d1f27" fill-opacity="0.92" stroke="#70a2a8" stroke-opacity="0.35"/>
    <rect x="470" y="300" width="185" height="18" fill="#2fffa8" fill-opacity="0.12"/>
    <text x="480" y="313" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.2" fill="#2fffa8">AUDIO · SPECTROGRAM</text>
    <path d="M470 300h10M470 300v10" stroke="#2fffa8" stroke-width="2" fill="none"/>
    <path d="M655 410h-10M655 410v-10" stroke="#2fffa8" stroke-width="2" fill="none"/>
    <g stroke="#e8f4f8" stroke-opacity="0.6" stroke-width="2">
      <line x1="484" y1="368" x2="484" y2="348"/><line x1="492" y1="374" x2="492" y2="342"/>
      <line x1="500" y1="362" x2="500" y2="354"/><line x1="508" y1="380" x2="508" y2="336"/>
      <line x1="516" y1="370" x2="516" y2="346"/><line x1="524" y1="358" x2="524" y2="358"/>
      <line x1="532" y1="378" x2="532" y2="338"/><line x1="540" y1="366" x2="540" y2="350"/>
      <line x1="548" y1="372" x2="548" y2="344"/><line x1="556" y1="360" x2="556" y2="356"/>
      <line x1="564" y1="382" x2="564" y2="334"/><line x1="572" y1="368" x2="572" y2="348"/>
      <line x1="580" y1="374" x2="580" y2="342"/><line x1="588" y1="362" x2="588" y2="354"/>
      <line x1="596" y1="378" x2="596" y2="338"/><line x1="604" y1="366" x2="604" y2="350"/>
      <line x1="612" y1="371" x2="612" y2="345"/><line x1="620" y1="359" x2="620" y2="357"/>
      <line x1="628" y1="376" x2="628" y2="340"/><line x1="636" y1="364" x2="636" y2="352"/>
    </g>
    <text x="480" y="398" font-family="ui-monospace, Menlo, monospace" font-size="8.5" letter-spacing="1" fill="#456c70">TONE BURST @ 18.2 kHz</text>
    <circle cx="643" cy="310" r="4" fill="#2fffa8"/>
  </g>

  <!-- ── evidence card: coordinates (red owner) ──────────────── -->
  <g>
    <rect x="230" y="440" width="175" height="105" fill="#0d1f27" fill-opacity="0.92" stroke="#70a2a8" stroke-opacity="0.35"/>
    <rect x="230" y="440" width="175" height="18" fill="#ff3b4e" fill-opacity="0.14"/>
    <text x="240" y="453" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.2" fill="#ff3b4e">COORDINATES</text>
    <path d="M230 440h10M230 440v10" stroke="#ff3b4e" stroke-width="2" fill="none"/>
    <path d="M405 545h-10M405 545v-10" stroke="#ff3b4e" stroke-width="2" fill="none"/>
    <circle cx="268" cy="500" r="17" fill="none" stroke="#70a2a8" stroke-opacity="0.5"/>
    <circle cx="268" cy="500" r="8" fill="none" stroke="#70a2a8" stroke-opacity="0.35"/>
    <circle cx="268" cy="500" r="2.5" fill="#ff3b4e"/>
    <line x1="268" y1="479" x2="268" y2="521" stroke="#70a2a8" stroke-opacity="0.35"/>
    <line x1="247" y1="500" x2="289" y2="500" stroke="#70a2a8" stroke-opacity="0.35"/>
    <text x="298" y="494" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">40.7128 N</text>
    <text x="298" y="510" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">74.0060 W</text>
    <text x="240" y="533" font-family="ui-monospace, Menlo, monospace" font-size="8.5" letter-spacing="1" fill="#456c70">PLOTTED TO MAP</text>
    <circle cx="393" cy="450" r="4" fill="#ff3b4e"/>
  </g>

  <!-- ── evidence card being dragged live by another analyst ─── -->
  <g>
    <rect x="700" y="440" width="165" height="100" fill="#0d1f27" fill-opacity="0.92" stroke="#ff9d2e" stroke-opacity="0.85" stroke-dasharray="4 3"/>
    <rect x="700" y="440" width="165" height="18" fill="#ff9d2e" fill-opacity="0.16"/>
    <text x="710" y="453" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.2" fill="#ff9d2e">FILE · CARVED</text>
    <text x="710" y="482" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">manifest.zip</text>
    <text x="710" y="500" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#b3e2e6">PK.. 3 entries</text>
    <text x="710" y="524" font-family="ui-monospace, Menlo, monospace" font-size="8.5" letter-spacing="1" fill="#456c70">ENTROPY 7.91</text>
    <circle cx="853" cy="450" r="4" fill="#ff9d2e"/>
    <!-- remote cursor -->
    <path d="M876 520 L876 552 L884 545 L890 558 L896 555 L890 542 L899 541 Z" fill="#ff9d2e" stroke="#020912" stroke-width="1"/>
    <rect x="902" y="546" width="78" height="17" fill="#ff9d2e"/>
    <text x="908" y="558" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1" fill="#020912">NIGHTWING</text>
  </g>

  <!-- ── right telemetry rail ────────────────────────────────── -->
  <line x1="1000" y1="52" x2="1000" y2="660" stroke="#70a2a8" stroke-opacity="0.18"/>
  <text x="1020" y="92" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="2" fill="#456c70">CASE STATUS</text>
  <rect x="1020" y="104" width="156" height="1" fill="#70a2a8" fill-opacity="0.25"/>
  <text x="1020" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" fill="#00f3ff">05</text>
  <text x="1060" y="130" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1" fill="#456c70">NODES PINNED</text>
  <text x="1020" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" fill="#00f3ff">04</text>
  <text x="1060" y="166" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1" fill="#456c70">LINKS DRAWN</text>

  <text x="1020" y="212" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="2" fill="#456c70">THREAT LEVEL</text>
  <rect x="1020" y="222" width="156" height="8" fill="#0d1f27" stroke="#70a2a8" stroke-opacity="0.25"/>
  <rect x="1021" y="223" width="104" height="6" fill="#ff9d2e"/>
  <text x="1020" y="248" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1" fill="#ff9d2e">ELEVATED</text>

  <text x="1020" y="292" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="2" fill="#456c70">SYNC LOG</text>
  <rect x="1020" y="302" width="156" height="1" fill="#70a2a8" fill-opacity="0.25"/>
  <text x="1020" y="324" font-family="ui-monospace, Menlo, monospace" font-size="8.5" fill="#2fffa8">[✓] NODE ADDED</text>
  <text x="1020" y="342" font-family="ui-monospace, Menlo, monospace" font-size="8.5" fill="#70a2a8">[~] DRAG BROADCAST</text>
  <text x="1020" y="360" font-family="ui-monospace, Menlo, monospace" font-size="8.5" fill="#2fffa8">[✓] LINK COMMITTED</text>
  <text x="1020" y="378" font-family="ui-monospace, Menlo, monospace" font-size="8.5" fill="#70a2a8">[~] PRESENCE SYNC</text>
  <text x="1020" y="396" font-family="ui-monospace, Menlo, monospace" font-size="8.5" fill="#2fffa8">[✓] SNAPSHOT SAVED</text>

  <rect width="1200" height="660" fill="url(#vig)"/>
  <rect x="0.5" y="0.5" width="1199" height="659" fill="none" stroke="#70a2a8" stroke-opacity="0.2"/>
</svg>
