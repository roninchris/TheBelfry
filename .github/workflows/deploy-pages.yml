# Deploys the public demo to GitHub Pages.
#
# The demo is deliberately built with NO Supabase environment variables. With
# none set the app runs guest-only: every analysis tool works, and the evidence
# board lives in each visitor's own browser. That is the correct configuration
# for a public demo — the maintainer's database is never reachable from it.
#
# Do NOT add VITE_SUPABASE_* secrets to this workflow. They would be compiled
# into a bundle served to the whole internet.
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      # BASE_PATH must match the repository name, since a project site is
      # served from https://<user>.github.io/<repo>/.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      # GitHub Pages has no SPA rewrite. The app has no client-side router, so
      # this only matters for a stray deep link or a refresh on a hashless URL;
      # serving index.html for those beats a 404 page.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
