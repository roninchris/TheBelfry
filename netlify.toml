# Netlify deployment.
#
# Netlify serves from the domain root, so `base` stays at its "/" default and
# BASE_PATH is deliberately not set here.
#
# The Supabase values are NOT in this file and must never be committed. Set them
# in the Netlify UI under Site configuration -> Environment variables:
#
#   VITE_SUPABASE_URL       https://<your-project-ref>.supabase.co
#   VITE_SUPABASE_ANON_KEY  <your anon / publishable key>
#
# Both are compiled into the bundle and are public by design; the security
# boundary is disabled signups plus Row Level Security. Never set a
# service_role key here — it bypasses RLS entirely.
#
# With no variables set the site still builds and runs guest-only.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# The app has no client-side router, but a refresh on any path should still
# land on the app rather than Netlify's 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
